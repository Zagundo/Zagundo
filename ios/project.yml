name: FloraGuide
options:
  minimumXcodeGenVersion: 2.38.0

targets:
  FloraGuide:
    type: application
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: Sources
      - path: Resources
    info:
      path: Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.floraguide
        SWIFT_VERSION: 5.10
        IPHONEOS_DEPLOYMENT_TARGET: 18.0
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    scheme:
      testTargets: []
